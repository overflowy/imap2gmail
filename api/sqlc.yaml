version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries.sql"
    schema: "internal/db/schema.sql"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_pointers_for_null_types: false
        overrides:
          - go_type: "bool"
            column: "settings.origin_ssl"
          - go_type: "bool"
            column: "settings.dry_run"
          - go_type: "bool"
            column: "accounts.sync_checked"
