name: Release Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  releases-matrix:
    name: Release ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Generate database code
        working-directory: api
        run: sqlc generate

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Copy frontend assets for embed
        run: |
          rm -rf api/internal/web/assets/dist
          mkdir -p api/internal/web/assets/dist
          cp -R frontend/dist/. api/internal/web/assets/dist/

      - name: Build binary
        working-directory: api
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          suffix=""
          if [ "$GOOS" = "windows" ]; then suffix=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o "../dist/imap2gmail-$GOOS-$GOARCH$suffix" .

      - name: Package release asset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          suffix=""
          if [ "$GOOS" = "windows" ]; then suffix=".exe"; fi

          asset="imap2gmail-${GITHUB_REF_NAME}-$GOOS-$GOARCH"
          mkdir -p "release/$asset"
          cp "dist/imap2gmail-$GOOS-$GOARCH$suffix" "release/$asset/imap2gmail$suffix"
          cp README.md LICENSE "release/$asset/"

          if [ "$ARCHIVE" = "zip" ]; then
            (cd release && zip -r "$asset.zip" "$asset")
          else
            tar -C release -czf "release/$asset.tar.gz" "$asset"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/imap2gmail-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          fail_on_unmatched_files: true
